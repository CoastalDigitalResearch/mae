# Debian automated preseed for mae PXE deployment
# Tested with Debian 12 (Bookworm)

d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network (DHCP)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string mae-node
d-i netcfg/get_domain string local

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Disk — wipe and use entire disk
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-auto/choose_recipe select atomic
d-i partman/confirm_write_new_label boolean true
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Root password (change this!)
d-i passwd/root-password password changeme
d-i passwd/root-password-again password changeme

# Create 'mae' user
d-i passwd/user-fullname string mae
d-i passwd/username string mae
d-i passwd/user-password password changeme
d-i passwd/user-password-again password changeme
d-i passwd/user-default-groups string sudo

# Minimal package selection
tasksel tasksel/first multiselect standard
d-i pkgsel/include string curl git docker.io

# Timezone
d-i time/zone string UTC
d-i clock-setup/utc boolean true

# Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# Post-install script
d-i preseed/late_command string in-target /bin/bash -c 'curl -fsSL https://raw.githubusercontent.com/caffeinum/mae/main/bootstrap/pxe/post-install.sh | bash'

d-i finish-install/reboot_in_progress note
